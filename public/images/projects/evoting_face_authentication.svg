<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a0533"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#22d3ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="voteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="224" x2="800" y2="224"/>
    <line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="250" cy="200" r="150" fill="#22d3ee" opacity="0.03"/>
  <circle cx="550" cy="200" r="130" fill="#6d28d9" opacity="0.04"/>

  <!-- FACE RECOGNITION PANEL -->
  <rect x="60" y="60" width="300" height="300" rx="16" fill="#0a0f1e" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Camera label -->
  <rect x="60" y="60" width="300" height="36" rx="16" fill="#0e2236"/>
  <rect x="60" y="80" width="300" height="16" fill="#0e2236"/>
  <circle cx="80" cy="78" r="7" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
  <circle cx="80" cy="78" r="3" fill="#22d3ee" opacity="0.7"/>
  <text x="210" y="83" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">FACE AUTHENTICATION</text>

  <!-- Face detection box -->
  <rect x="120" y="108" width="180" height="200" rx="4" fill="#050a14"/>

  <!-- Face outline (simplified) -->
  <ellipse cx="210" cy="195" rx="60" ry="75" fill="#0f172a" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Feature detection dots -->
  <g filter="url(#glow)">
    <!-- Eyes -->
    <circle cx="192" cy="172" r="3" fill="#22d3ee"/>
    <circle cx="228" cy="172" r="3" fill="#22d3ee"/>
    <!-- Nose -->
    <circle cx="210" cy="193" r="2.5" fill="#22d3ee"/>
    <!-- Mouth corners -->
    <circle cx="195" cy="212" r="2" fill="#22d3ee"/>
    <circle cx="225" cy="212" r="2" fill="#22d3ee"/>
    <!-- Chin, forehead, cheeks -->
    <circle cx="210" cy="230" r="2" fill="#22d3ee" opacity="0.7"/>
    <circle cx="210" cy="140" r="2" fill="#22d3ee" opacity="0.7"/>
    <circle cx="160" cy="195" r="2" fill="#22d3ee" opacity="0.5"/>
    <circle cx="260" cy="195" r="2" fill="#22d3ee" opacity="0.5"/>
    <circle cx="175" cy="160" r="2" fill="#22d3ee" opacity="0.6"/>
    <circle cx="245" cy="160" r="2" fill="#22d3ee" opacity="0.6"/>
    <circle cx="180" cy="215" r="1.5" fill="#22d3ee" opacity="0.5"/>
    <circle cx="240" cy="215" r="1.5" fill="#22d3ee" opacity="0.5"/>
  </g>

  <!-- Facial mesh lines -->
  <g stroke="#22d3ee" stroke-width="0.4" opacity="0.25">
    <line x1="192" y1="172" x2="210" y2="193"/>
    <line x1="228" y1="172" x2="210" y2="193"/>
    <line x1="210" y1="193" x2="195" y2="212"/>
    <line x1="210" y1="193" x2="225" y2="212"/>
    <line x1="192" y1="172" x2="175" y2="160"/>
    <line x1="228" y1="172" x2="245" y2="160"/>
    <line x1="192" y1="172" x2="195" y2="212"/>
    <line x1="228" y1="172" x2="225" y2="212"/>
    <line x1="192" y1="172" x2="228" y2="172"/>
    <line x1="195" y1="212" x2="225" y2="212"/>
    <line x1="210" y1="140" x2="192" y2="172"/>
    <line x1="210" y1="140" x2="228" y2="172"/>
    <line x1="195" y1="212" x2="210" y2="230"/>
    <line x1="225" y1="212" x2="210" y2="230"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#22d3ee" stroke-width="2.5" fill="none" filter="url(#glow)">
    <path d="M128,116 L128,108 L136,108"/>
    <path d="M284,116 L284,108 L292,108"/>
    <path d="M128,300 L128,308 L136,308"/>
    <path d="M284,300 L284,308 L292,308"/>
  </g>

  <!-- Scan line -->
  <rect x="120" y="175" width="180" height="28" fill="url(#scanGrad)" opacity="0.7"/>
  <line x1="120" y1="189" x2="300" y2="189" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>

  <!-- Match confidence -->
  <rect x="90" y="320" width="240" height="28" rx="6" fill="#0e2236"/>
  <rect x="90" y="320" width="218" height="28" rx="6" fill="#164e63" opacity="0.8"/>
  <text x="125" y="338" fill="#67e8f9" font-size="10">Match Confidence: </text>
  <text x="240" y="338" fill="#22d3ee" font-size="10" font-weight="700">97.4%</text>

  <!-- Arrow middle -->
  <g filter="url(#glow)">
    <line x1="365" y1="200" x2="435" y2="200" stroke="#6d28d9" stroke-width="2.5" stroke-dasharray="8,4"/>
    <polygon points="435,200 425,194 425,206" fill="#6d28d9"/>
    <text x="400" y="190" text-anchor="middle" fill="#a78bfa" font-size="9">VERIFIED</text>
    <circle cx="400" cy="215" r="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  </g>

  <!-- VOTING PANEL -->
  <rect x="445" y="60" width="310" height="300" rx="16" fill="#0f0a1e" stroke="#6d28d9" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Panel header -->
  <rect x="445" y="60" width="310" height="36" rx="16" fill="url(#voteGrad)"/>
  <rect x="445" y="80" width="310" height="16" fill="url(#voteGrad)"/>
  <text x="600" y="83" text-anchor="middle" fill="white" font-size="11" font-weight="700">SECURE E-VOTING</text>

  <!-- Ballot options -->
  <g>
    <!-- Option A -->
    <rect x="465" y="112" width="270" height="50" rx="8" fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="490" cy="137" r="12" fill="#3730a3"/>
    <text x="490" y="141" text-anchor="middle" fill="white" font-size="11" font-weight="700">A</text>
    <text x="512" y="133" fill="#e0e7ff" font-size="11" font-weight="600">Candidate Alpha</text>
    <text x="512" y="147" fill="#818cf8" font-size="9">Party: Progressive Alliance</text>
    <circle cx="715" cy="137" r="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="715" cy="137" r="5" fill="#818cf8"/>

    <!-- Option B -->
    <rect x="465" y="174" width="270" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="490" cy="199" r="12" fill="#334155"/>
    <text x="490" y="203" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">B</text>
    <text x="512" y="195" fill="#94a3b8" font-size="11" font-weight="600">Candidate Beta</text>
    <text x="512" y="209" fill="#64748b" font-size="9">Party: National Unity</text>
    <circle cx="715" cy="199" r="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>

    <!-- Option C -->
    <rect x="465" y="236" width="270" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="490" cy="261" r="12" fill="#334155"/>
    <text x="490" y="265" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">C</text>
    <text x="512" y="257" fill="#94a3b8" font-size="11" font-weight="600">Candidate Gamma</text>
    <text x="512" y="271" fill="#64748b" font-size="9">Party: People's Front</text>
    <circle cx="715" cy="261" r="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  </g>

  <!-- Vote button -->
  <rect x="510" y="300" width="180" height="38" rx="8" fill="url(#voteGrad)" filter="url(#glow)"/>
  <text x="600" y="324" text-anchor="middle" fill="white" font-size="13" font-weight="700">Cast Vote →</text>

  <!-- Security badges -->
  <g>
    <rect x="445" y="45" width="70" height="18" rx="9" fill="#0f172a" stroke="#22d3ee" stroke-width="1"/>
    <text x="480" y="57" text-anchor="middle" fill="#67e8f9" font-size="8">OpenCV</text>
    <rect x="525" y="45" width="70" height="18" rx="9" fill="#0f172a" stroke="#6d28d9" stroke-width="1"/>
    <text x="560" y="57" text-anchor="middle" fill="#a78bfa" font-size="8">🔒 Secure</text>
    <rect x="605" y="45" width="70" height="18" rx="9" fill="#0f172a" stroke="#4ade80" stroke-width="1"/>
    <text x="640" y="57" text-anchor="middle" fill="#86efac" font-size="8">Real-time</text>
  </g>

  <!-- Title -->
  <text x="400" y="415" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">E-Voting System with Face Authentication</text>
  <text x="400" y="438" text-anchor="middle" fill="#64748b" font-size="12">Python · OpenCV · Facial Recognition · Real-time Auth</text>
</svg>
