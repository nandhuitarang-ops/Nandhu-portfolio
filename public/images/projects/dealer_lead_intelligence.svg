<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="funnelGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="funnelGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="224" x2="800" y2="224"/>
    <line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Web nodes (source) -->
  <g filter="url(#glow)">
    <circle cx="80" cy="100" r="28" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="80" y="96" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">Source</text>
    <text x="80" y="108" text-anchor="middle" fill="#fbbf24" font-size="8">Web A</text>

    <circle cx="80" cy="200" r="28" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="80" y="196" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">Source</text>
    <text x="80" y="208" text-anchor="middle" fill="#fbbf24" font-size="8">Web B</text>

    <circle cx="80" cy="300" r="28" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="80" y="296" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">Source</text>
    <text x="80" y="308" text-anchor="middle" fill="#fbbf24" font-size="8">API C</text>
  </g>

  <!-- Scraper engine -->
  <rect x="155" y="165" width="100" height="70" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5" filter="url(#glow)"/>
  <text x="205" y="196" text-anchor="middle" fill="#f97316" font-size="11" font-weight="700">SCRAPER</text>
  <text x="205" y="212" text-anchor="middle" fill="#fdba74" font-size="9">ENGINE</text>
  <!-- Gear icon -->
  <circle cx="205" cy="223" r="5" fill="none" stroke="#f97316" stroke-width="1.2"/>

  <!-- Arrows from sources to scraper -->
  <g stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.7">
    <line x1="108" y1="110" x2="152" y2="185"/>
    <line x1="108" y1="200" x2="152" y2="200"/>
    <line x1="108" y1="290" x2="152" y2="215"/>
    <polygon points="152,185 144,183 146,191" fill="#f59e0b"/>
    <polygon points="152,200 144,196 144,204" fill="#f59e0b"/>
    <polygon points="152,215 144,209 146,217" fill="#f59e0b"/>
  </g>

  <!-- Dedup engine -->
  <rect x="295" y="155" width="110" height="90" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="1.5" filter="url(#glow)"/>
  <text x="350" y="190" text-anchor="middle" fill="#818cf8" font-size="10" font-weight="700">DEDUP</text>
  <text x="350" y="205" text-anchor="middle" fill="#a5b4fc" font-size="9">Phone Normalize</text>
  <text x="350" y="218" text-anchor="middle" fill="#a5b4fc" font-size="9">Name Match</text>
  <text x="350" y="231" text-anchor="middle" fill="#a5b4fc" font-size="9">Location Filter</text>
  <!-- Arrow scraper to dedup -->
  <line x1="257" y1="200" x2="292" y2="200" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="292,200 284,196 284,204" fill="#f97316"/>

  <!-- Funnel visualization -->
  <g>
    <!-- Raw leads -->
    <polygon points="440,120 560,120 545,170 455,170" fill="#f59e0b" opacity="0.85"/>
    <text x="500" y="150" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="700">Raw Leads</text>

    <!-- Qualified -->
    <polygon points="455,175 545,175 532,225 468,225" fill="url(#funnelGrad2)" opacity="0.85"/>
    <text x="500" y="205" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Qualified</text>

    <!-- Converted -->
    <polygon points="468,230 532,230 522,280 478,280" fill="url(#funnelGrad3)" opacity="0.9"/>
    <text x="500" y="262" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Converted</text>
  </g>

  <!-- Arrow dedup to funnel -->
  <line x1="407" y1="200" x2="437" y2="160" stroke="#818cf8" stroke-width="1.5"/>
  <polygon points="437,160 431,168 439,168" fill="#818cf8"/>

  <!-- Lead cards on right -->
  <g>
    <rect x="590" y="100" width="160" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <circle cx="615" cy="120" r="10" fill="#166534"/>
    <text x="615" y="124" text-anchor="middle" fill="#22c55e" font-size="10">✓</text>
    <text x="640" y="116" fill="#e2e8f0" font-size="10" font-weight="600">Dealer: Ravi Auto</text>
    <text x="640" y="130" fill="#64748b" font-size="9">+91 9876543210</text>
    <rect x="631" y="138" width="55" height="14" rx="7" fill="#14532d"/>
    <text x="659" y="148" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="700">CONVERTED</text>

    <rect x="590" y="175" width="160" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <circle cx="615" cy="195" r="10" fill="#451a03"/>
    <text x="615" y="199" text-anchor="middle" fill="#f59e0b" font-size="10">→</text>
    <text x="640" y="191" fill="#e2e8f0" font-size="10" font-weight="600">Dealer: KM Motors</text>
    <text x="640" y="205" fill="#64748b" font-size="9">Hyderabad, TG</text>
    <rect x="631" y="213" width="55" height="14" rx="7" fill="#451a03"/>
    <text x="659" y="223" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="700">EXPLORING</text>

    <rect x="590" y="250" width="160" height="60" rx="8" fill="#1e293b" stroke="#818cf8" stroke-width="1"/>
    <circle cx="615" cy="270" r="10" fill="#1e1b4b"/>
    <text x="615" y="274" text-anchor="middle" fill="#818cf8" font-size="10">•</text>
    <text x="640" y="266" fill="#e2e8f0" font-size="10" font-weight="600">Dealer: Vijay Bikes</text>
    <text x="640" y="280" fill="#64748b" font-size="9">Chennai, TN</text>
    <rect x="631" y="288" width="55" height="14" rx="7" fill="#1e1b4b"/>
    <text x="659" y="298" text-anchor="middle" fill="#818cf8" font-size="8" font-weight="700">ASSIGNED</text>
  </g>

  <!-- Arrow funnel to cards -->
  <line x1="533" y1="255" x2="587" y2="210" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <polygon points="587,210 579,210 581,218" fill="#22c55e" opacity="0.6"/>

  <!-- Stat badge -->
  <rect x="590" y="330" width="160" height="50" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="670" y="350" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="800">35%</text>
  <text x="670" y="368" text-anchor="middle" fill="#64748b" font-size="10">Fewer Duplicates</text>

  <!-- Title -->
  <text x="400" y="415" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Dealer Scraper &amp; Lead Intelligence</text>
  <text x="400" y="438" text-anchor="middle" fill="#64748b" font-size="12">JavaScript · APIs · Deduplication · Lead Tracking</text>
</svg>
