<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0c1a2e"/>
    </linearGradient>
    <linearGradient id="chatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="kbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Background glow orbs -->
  <circle cx="200" cy="225" r="120" fill="#7c3aed" opacity="0.05"/>
  <circle cx="600" cy="225" r="120" fill="#0891b2" opacity="0.05"/>

  <!-- Grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="224" x2="800" y2="224"/>
    <line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Chat panel -->
  <rect x="40" y="50" width="300" height="320" rx="14" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Chat header -->
  <rect x="40" y="50" width="300" height="44" rx="14" fill="url(#chatGrad)"/>
  <rect x="40" y="72" width="300" height="22" fill="url(#chatGrad)"/>
  <circle cx="68" cy="72" r="12" fill="#5b21b6"/>
  <text x="68" y="76" text-anchor="middle" fill="#e9d5ff" font-size="12">AI</text>
  <text x="160" y="78" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Knowledge Bot</text>
  <circle cx="325" cy="72" r="5" fill="#4ade80"/>

  <!-- Messages -->
  <!-- User message -->
  <rect x="160" y="108" width="165" height="38" rx="10" fill="#1e293b"/>
  <text x="175" y="124" fill="#e2e8f0" font-size="9">What is our refund policy</text>
  <text x="175" y="138" fill="#e2e8f0" font-size="9">for Q3 orders?</text>

  <!-- Bot message -->
  <rect x="55" y="158" width="200" height="60" rx="10" fill="#2e1065" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="70" y="174" fill="#c4b5fd" font-size="9" font-weight="600">Based on company policy:</text>
  <text x="70" y="188" fill="#ddd6fe" font-size="9">Q3 orders qualify for 30-day</text>
  <text x="70" y="200" fill="#ddd6fe" font-size="9">return window. See Doc §4.2</text>
  <!-- Source citation -->
  <rect x="55" y="222" width="80" height="14" rx="7" fill="#3b0764" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="95" y="232" text-anchor="middle" fill="#a78bfa" font-size="8">§ policy_q3.pdf</text>

  <!-- User message 2 -->
  <rect x="165" y="248" width="160" height="28" rx="10" fill="#1e293b"/>
  <text x="180" y="267" fill="#e2e8f0" font-size="9">Who can approve exceptions?</text>

  <!-- Bot message 2 -->
  <rect x="55" y="288" width="185" height="42" rx="10" fill="#2e1065" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="70" y="305" fill="#c4b5fd" font-size="9" font-weight="600">Access restricted to your role.</text>
  <text x="70" y="319" fill="#ddd6fe" font-size="9">Managers+ can view approvals.</text>

  <!-- Role badge -->
  <rect x="55" y="338" width="90" height="16" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="0.8"/>
  <text x="100" y="349" text-anchor="middle" fill="#818cf8" font-size="8">🔒 RBAC Enforced</text>

  <!-- Arrow in middle -->
  <g filter="url(#glow)">
    <line x1="345" y1="225" x2="420" y2="225" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,3"/>
    <polygon points="420,225 412,220 412,230" fill="#7c3aed"/>
    <text x="382" y="218" text-anchor="middle" fill="#a78bfa" font-size="9">RAG Query</text>

    <line x1="420" y1="235" x2="345" y2="235" stroke="#0891b2" stroke-width="2" stroke-dasharray="6,3"/>
    <polygon points="345,235 353,230 353,240" fill="#0891b2"/>
    <text x="382" y="248" text-anchor="middle" fill="#67e8f9" font-size="9">Retrieved Context</text>
  </g>

  <!-- Knowledge base panel -->
  <rect x="430" y="50" width="330" height="320" rx="14" fill="#0f172a" stroke="#0891b2" stroke-width="1.5" filter="url(#glow)"/>

  <!-- KB header -->
  <rect x="430" y="50" width="330" height="44" rx="14" fill="url(#kbGrad)"/>
  <rect x="430" y="72" width="330" height="22" fill="url(#kbGrad)"/>
  <text x="595" y="78" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Knowledge Base</text>

  <!-- Document chunks -->
  <g>
    <!-- Doc 1 -->
    <rect x="450" y="108" width="290" height="50" rx="8" fill="#1e293b" stroke="#0891b2" stroke-width="0.8"/>
    <rect x="450" y="108" width="4" height="50" rx="2" fill="#0891b2"/>
    <text x="468" y="126" fill="#67e8f9" font-size="10" font-weight="600">policy_q3.pdf — Chunk 4</text>
    <text x="468" y="140" fill="#94a3b8" font-size="9">Returns and refund eligibility criteria</text>
    <text x="468" y="152" fill="#94a3b8" font-size="9">for Q3 order cycle...</text>
    <rect x="710" y="114" width="22" height="14" rx="7" fill="#164e63"/>
    <text x="721" y="123" text-anchor="middle" fill="#67e8f9" font-size="8">0.94</text>

    <!-- Doc 2 -->
    <rect x="450" y="170" width="290" height="50" rx="8" fill="#1e293b" stroke="#0891b2" stroke-width="0.8"/>
    <rect x="450" y="170" width="4" height="50" rx="2" fill="#7c3aed"/>
    <text x="468" y="188" fill="#c4b5fd" font-size="10" font-weight="600">approvals_guide.docx — Chunk 2</text>
    <text x="468" y="202" fill="#94a3b8" font-size="9">Manager-level access for exception</text>
    <text x="468" y="214" fill="#94a3b8" font-size="9">handling and override requests...</text>
    <rect x="710" y="176" width="22" height="14" rx="7" fill="#2e1065"/>
    <text x="721" y="185" text-anchor="middle" fill="#a78bfa" font-size="8">0.87</text>

    <!-- Doc 3 -->
    <rect x="450" y="232" width="290" height="50" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="0.8" opacity="0.7"/>
    <rect x="450" y="232" width="4" height="50" rx="2" fill="#475569"/>
    <text x="468" y="250" fill="#64748b" font-size="10" font-weight="600">hr_handbook.pdf — Chunk 9</text>
    <text x="468" y="264" fill="#64748b" font-size="9">Employee escalation procedures</text>
    <text x="468" y="276" fill="#64748b" font-size="9">and exception workflows...</text>
    <rect x="710" y="238" width="22" height="14" rx="7" fill="#1e293b"/>
    <text x="721" y="247" text-anchor="middle" fill="#475569" font-size="8">0.71</text>

    <!-- Embedding vectors visualization -->
    <rect x="450" y="295" width="290" height="55" rx="8" fill="#0a0f1e" stroke="#1e293b" stroke-width="1"/>
    <text x="465" y="313" fill="#475569" font-size="9">pgvector HNSW Index</text>
    <!-- Vector bars -->
    <g opacity="0.6">
      <rect x="465" y="320" width="6" height="20" rx="1" fill="#0891b2"/>
      <rect x="475" y="328" width="6" height="12" rx="1" fill="#0891b2"/>
      <rect x="485" y="315" width="6" height="25" rx="1" fill="#0891b2"/>
      <rect x="495" y="322" width="6" height="18" rx="1" fill="#7c3aed"/>
      <rect x="505" y="325" width="6" height="15" rx="1" fill="#7c3aed"/>
      <rect x="515" y="318" width="6" height="22" rx="1" fill="#0891b2"/>
      <rect x="525" y="326" width="6" height="14" rx="1" fill="#0891b2"/>
      <rect x="535" y="320" width="6" height="20" rx="1" fill="#7c3aed"/>
      <rect x="545" y="323" width="6" height="17" rx="1" fill="#0891b2"/>
      <rect x="555" y="319" width="6" height="21" rx="1" fill="#0891b2"/>
      <rect x="565" y="327" width="6" height="13" rx="1" fill="#7c3aed"/>
      <rect x="575" y="316" width="6" height="24" rx="1" fill="#0891b2"/>
      <rect x="585" y="321" width="6" height="19" rx="1" fill="#0891b2"/>
      <rect x="595" y="329" width="6" height="11" rx="1" fill="#7c3aed"/>
      <rect x="605" y="317" width="6" height="23" rx="1" fill="#0891b2"/>
      <rect x="615" y="324" width="6" height="16" rx="1" fill="#0891b2"/>
      <rect x="625" y="319" width="6" height="21" rx="1" fill="#7c3aed"/>
      <rect x="635" y="326" width="6" height="14" rx="1" fill="#0891b2"/>
      <rect x="645" y="321" width="6" height="19" rx="1" fill="#0891b2"/>
      <rect x="655" y="315" width="6" height="25" rx="1" fill="#0891b2"/>
      <rect x="665" y="323" width="6" height="17" rx="1" fill="#7c3aed"/>
      <rect x="675" y="320" width="6" height="20" rx="1" fill="#0891b2"/>
      <rect x="685" y="328" width="6" height="12" rx="1" fill="#0891b2"/>
      <rect x="695" y="317" width="6" height="23" rx="1" fill="#7c3aed"/>
      <rect x="705" y="322" width="6" height="18" rx="1" fill="#0891b2"/>
      <rect x="715" y="325" width="6" height="15" rx="1" fill="#0891b2"/>
    </g>
  </g>

  <!-- Title -->
  <text x="400" y="415" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">RAG-Based Knowledge Chatbot</text>
  <text x="400" y="438" text-anchor="middle" fill="#64748b" font-size="12">JavaScript · PostgreSQL · Embeddings · RBAC · pgvector</text>
</svg>
